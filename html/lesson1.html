<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 1 | Stuf_y's Learn To Code</title>

<style>
:root {
    --bg: #000000;
    --panel-bg: #000000;
    --text: #e6e6e6;
    --border: #2a2a2a;
}
html, body { height: 100%; }
* { box-sizing: border-box; }

body {
    margin: 0;
    color: var(--text);
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
}

.page {
    display: flex;
    height: 100vh;
}

.left, .right {
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
}

.code {
    background: #171718;
    border: 1px solid var(--border);
    flex: 1;
    padding: 10px;
    overflow: auto;
    white-space: pre;
    font-family: Consolas, monospace;
}

.tabs {
    display: flex;
    border-bottom: 2px solid var(--border);
}

.tab {
    padding: 10px;
    cursor: pointer;
}

.tab.active {
    font-weight: bold;
    border-bottom: 2px solid white;
}

.tab-panel {
    display: none;
    border: 1px solid var(--border);
    flex: 1;
}

.tab-panel.active {
    display: block;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
}

.controls {
    margin-bottom: 20px;
}

.controls button {
    height: 150%;
}

.tab-explain {
    padding-left: 10px;
    padding-right: 10px;
}
</style>
</head>

<body>

<div class="page">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="controls">
            <button id="saveBtn">Save</button>
            <span id="saveStatus"></span>
        </div>

        <div id="codeArea" class="code" contenteditable="true">
&lt;!DOCTYPE html&gt;
&lt;html&gt;
&lt;head&gt;
    &lt;title&gt;My Page&lt;/title&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;h1&gt;Hello world!&lt;/h1&gt;
&lt;/body&gt;
&lt;/html&gt;
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="tabs">
            <div class="tab active" data-tab="preview">Preview</div>
            <div class="tab" data-tab="explanation">Explanation</div>
        </div>

        <div class="tab-panel active" id="preview">
            <iframe id="previewFrame"></iframe>
        </div>

        <div class="tab-panel tab-explain" id="explanation">
            <p>Hello</p>
        </div>
    </div>

</div>

<script>
const codeArea = document.getElementById('codeArea');
const previewFrame = document.getElementById('previewFrame');
const saveBtn = document.getElementById('saveBtn');
const saveStatus = document.getElementById('saveStatus');

const tabs = document.querySelectorAll('.tab');
const panels = document.querySelectorAll('.tab-panel');

function renderPreview() {
    let code = codeArea.textContent;

    // Convert escaped HTML to real HTML
    code = code
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&amp;/g, "&");

    previewFrame.srcdoc = code;
}

// Tab switching
tabs.forEach(tab => {
    tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));

        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
    });
});

// LIVE preview
codeArea.addEventListener('input', renderPreview);

// SAVE (download + localStorage)
saveBtn.addEventListener('click', () => {
    let code = codeArea.textContent;

    code = code
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&amp;/g, "&");

    // Download file
    const blob = new Blob([code], { type: 'text/html' });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'my-code.html';
    a.click();

    URL.revokeObjectURL(url);

    setTimeout(() => saveStatus.textContent = "", 1500);
});

restoreCode();
</script>

</body>
</html>
